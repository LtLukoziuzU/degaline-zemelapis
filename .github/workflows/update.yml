name: Update fuel prices

on:
  schedule:
    - cron: '0 7 * * *'   # 07:00 UTC daily (≈ 10:00 Vilnius time)
  workflow_dispatch:        # manual trigger from GitHub UI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install openpyxl

      - name: Run pipeline
        id: pipeline
        run: python3 pipeline.py

      - name: Send change notification
        if: steps.pipeline.outputs.has_changes == 'true'
        uses: dawidd6/action-send-mail@v13
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.NOTIFY_EMAIL_USER }}
          password: ${{ secrets.NOTIFY_EMAIL_PASS }}
          to: ${{ secrets.NOTIFY_EMAIL_TO }}
          from: Degalinių žemėlapis <${{ secrets.NOTIFY_EMAIL_USER }}>
          subject: "Degalinės: ${{ steps.pipeline.outputs.new_count }} naujos, ${{ steps.pipeline.outputs.removed_count }} pašalintos, ${{ steps.pipeline.outputs.changed_count }} kainų pokyčių (${{ steps.pipeline.outputs.date }})"
          body: file://data/logs/${{ steps.pipeline.outputs.date }}.log

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/stations.json data/geocache.json data/history/ data/logs/
          if git diff --staged --quiet; then
            echo "No data changes — skipping commit."
          else
            git commit -m "chore: update fuel prices $(date -u +%Y-%m-%d)"
            git push
          fi

  deploy:
    needs: update-data
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main   # ensure we get the freshly committed data

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v5
